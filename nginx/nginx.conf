worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile    on;
    tcp_nopush  on;
    tcp_nodelay on;

    keepalive_timeout 65;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/xml+rss application/atom+xml image/svg+xml;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    upstream web {
        server 127.0.0.1:3000 fail_timeout=0;
    }

    upstream streaming {
        server 127.0.0.1:4000 fail_timeout=0;
    }

    # HTTP -> HTTPS redirect
    server {
        listen 80;
        listen [::]:80;
        server_name yip.yip.yip.yip.yip.computer;

        # ACME challenge
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # HTTPS
    server {
        listen 443 ssl http2;
        listen [::]:443 ssl http2;
        server_name yip.yip.yip.yip.yip.computer;

        ssl_certificate     /etc/letsencrypt/live/yip.yip.yip.yip.yip.computer/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/yip.yip.yip.yip.yip.computer/privkey.pem;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;

        client_max_body_size 40m;

        # Static info page (publicly accessible, bypasses Mastodon auth)
        # Static files (override Mastodon defaults)
        location = /info {
            alias /var/www/static/info.html;
            default_type text/html;
        }

        location = /robots.txt {
            alias /var/www/static/robots.txt;
            default_type text/plain;
        }

        location = /llms.txt {
            alias /var/www/static/llms.txt;
            default_type text/plain;
        }

        # Block ActivityPub federation endpoints at nginx level.
        # This instance is publicly viewable but does not federate.
        # AUTHORIZED_FETCH=true in Mastodon provides defense-in-depth.
        location ~ ^/(inbox|users/.*/inbox|users/.*/outbox) {
            return 404;
        }
        location /.well-known/webfinger {
            return 404;
        }
        location /.well-known/host-meta {
            return 404;
        }
        location /.well-known/nodeinfo {
            return 404;
        }
        location /api/v1/instance/peers {
            return 404;
        }

        # Redirect web signup form to API docs
        location /auth/sign_up {
            return 301 /info;
        }

        # Streaming API
        location /api/v1/streaming {
            proxy_pass http://streaming;
            proxy_buffering off;
            proxy_redirect off;
            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;

            tcp_nodelay on;
        }

        # Everything else -> web
        location / {
            proxy_pass http://web;
            proxy_redirect off;
            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;

            proxy_buffering on;

            tcp_nodelay on;

            # Extend Mastodon's CSP to allow Handfish fonts from fonts.noisefactor.io.
            # Strip Mastodon's CSP header and replace with an expanded version.
            proxy_hide_header Content-Security-Policy;
            add_header Content-Security-Policy "base-uri 'none'; default-src 'none'; frame-ancestors 'none'; font-src 'self' https://yip.yip.yip.yip.yip.computer https://fonts.noisefactor.io; img-src 'self' data: blob: https://yip.yip.yip.yip.yip.computer; media-src 'self' data: https://yip.yip.yip.yip.yip.computer; manifest-src 'self' https://yip.yip.yip.yip.yip.computer; form-action 'self'; child-src 'self' blob: https://yip.yip.yip.yip.yip.computer; worker-src 'self' blob: https://yip.yip.yip.yip.yip.computer; connect-src 'self' data: blob: https://yip.yip.yip.yip.yip.computer wss://yip.yip.yip.yip.yip.computer; script-src 'self' https://yip.yip.yip.yip.yip.computer 'wasm-unsafe-eval'; frame-src 'self' https:; style-src 'self' https://yip.yip.yip.yip.yip.computer 'unsafe-inline'" always;
        }

        # Error pages
        error_page 500 501 502 503 504 /500.html;
    }


    # ── NF CDN Cache ──────────────────────────────────────────
    server {
        listen 80;
        listen [::]:80;
        server_name fonts.noisefactor.io shaders.noisedeck.app handfish.noisefactor.io;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl http2;
        listen [::]:443 ssl http2;
        server_name fonts.noisefactor.io shaders.noisedeck.app handfish.noisefactor.io;

        ssl_certificate /etc/letsencrypt/live/fonts.noisefactor.io/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/fonts.noisefactor.io/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;

        location / {
            proxy_pass http://127.0.0.1:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }

}
